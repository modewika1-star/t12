<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
</head>
<body class="bg-light">

  
  <div class="w-100 bg-dark p-4 p-md-5">
    <h2 class="text-white mb-4">Add new task</h2>

    <div class="mb-3">
      <label for="taskName" class="form-label text-secondary">Task Name</label>
      <input type="text" id="taskName" class="form-control" placeholder="Enter task name" />
    </div>

    <div class="mb-4">
      <label for="taskDesc" class="form-label text-secondary">Task Description</label>
      <input type="text" id="taskDesc" class="form-control" placeholder="Enter task description" />
    </div>

    <button class="btn btn-primary w-100 mb-3" onclick="addTask()">Add Task</button>

    
    <div class="d-flex gap-2 flex-wrap justify-content-center">
      <button id="btn-all" class="btn btn-primary" onclick="filterTasks('all')">All Tasks</button>
      <button id="btn-completed" class="btn btn-outline-primary" onclick="filterTasks('completed')">Completed Tasks</button>
      <button id="btn-waiting" class="btn btn-outline-primary" onclick="filterTasks('waiting')">Waiting Tasks</button>
    </div>
  </div>

  
  <div class="container-fluid px-4 px-md-5 py-4">
    <div class="table-responsive shadow-sm rounded">
      <table class="table table-bordered table-hover align-middle bg-white mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Task Name</th>
            <th>Task Description</th>
            <th>Task Status</th>
            <th>Handle</th>
          </tr>
        </thead>
        <tbody id="taskTableBody"></tbody>
      </table>
    </div>
  </div>

  
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content bg-dark text-white">
        <div class="modal-header border-secondary">
          <h5 class="modal-title" id="editModalLabel">Edit Task</h5>
          <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label text-secondary">Task Name</label>
            <input type="text" id="editName" class="form-control" />
          </div>
          <div class="mb-3">
            <label class="form-label text-secondary">Task Description</label>
            <input type="text" id="editDesc" class="form-control" />
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveEdit()">Save</button>
        </div>
      </div>
    </div>
  </div>

  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="Js/script1.js"></script>
</body>
</html>
